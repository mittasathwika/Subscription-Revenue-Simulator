<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Subscription Revenue Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 60px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 40px;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-header h1 {
            font-size: 1.8rem;
            color: #1a202c;
        }
        .profile-header p {
            color: #64748b;
            margin-top: 8px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto 20px;
        }
        .form-section {
            margin-bottom: 25px;
        }
        .form-section h3 {
            font-size: 1rem;
            color: #4a5568;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .profile-field label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
        }
        .profile-field input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        .profile-field input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .profile-field input:disabled {
            background: #f7fafc;
            color: #718096;
            cursor: not-allowed;
        }
        .field-hint {
            font-size: 0.75rem;
            color: #a0aec0;
        }
        .password-fields {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-back {
            background: #edf2f7;
            color: #4a5568;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: #e2e8f0;
        }
        .btn-save {
            flex: 1;
            background: #3182ce;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            background: #2c5282;
        }
        .success-message {
            background: #c6f6d5;
            color: #276749;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar" id="avatarInitials">👤</div>
            <h1>My Profile</h1>
            <p>Manage your account details</p>
        </div>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <form id="profileForm">
            <div class="form-section">
                <h3>👤 Personal Information</h3>
                <div class="profile-field">
                    <label for="profileFirstName">First Name</label>
                    <input type="text" id="profileFirstName" required>
                </div>
                <div class="profile-field">
                    <label for="profileLastName">Last Name</label>
                    <input type="text" id="profileLastName" required>
                </div>
                <div class="profile-field">
                    <label for="profilePhone">Mobile Number</label>
                    <input type="tel" id="profilePhone">
                </div>
            </div>

            <div class="form-section">
                <h3>📧 Account</h3>
                <div class="profile-field">
                    <label for="profileEmail">Email</label>
                    <input type="email" id="profileEmail" disabled>
                    <span class="field-hint">Email cannot be changed</span>
                </div>
            </div>

            <div class="form-section" id="passwordSection">
                <h3>🔒 Change Password</h3>
                <div class="password-fields">
                    <div class="profile-field">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password to change it">
                    </div>
                    <div class="profile-field">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" minlength="8" placeholder="Min 8 chars, A-Z, a-z, 0-9">
                    </div>
                    <div class="profile-field">
                        <label for="confirmNewPassword">Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" placeholder="Re-enter new password">
                    </div>
                </div>
                <span class="field-hint">Leave blank if you don't want to change your password</span>
            </div>

            <div class="btn-group">
                <a href="index.html" class="btn-back">← Back</a>
                <button type="submit" class="btn-save">💾 Save Changes</button>
            </div>
        </form>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:3001/api'
            : window.location.hostname.includes('cloudfront.net')
                ? '/api'
                : 'http://subscription-simulator-api-env.eba-bwarrbi6.us-east-1.elasticbeanstalk.com/api';

        // Check auth
        const token = localStorage.getItem('authToken');
        const user = JSON.parse(localStorage.getItem('currentUser') || 'null');

        if (!token || !user) {
            window.location.href = 'login.html';
        }

        // Fill form with current data
        document.getElementById('profileFirstName').value = user.first_name || '';
        document.getElementById('profileLastName').value = user.last_name || '';
        document.getElementById('profilePhone').value = user.phone || '';
        document.getElementById('profileEmail').value = user.email || '';

        // Set avatar initials
        const first = (user.first_name || user.email || 'U').charAt(0).toUpperCase();
        const last = (user.last_name || '').charAt(0).toUpperCase();
        document.getElementById('avatarInitials').textContent = first + last || '👤';

        // Hide password section for social auth users
        if (user.auth_provider && user.auth_provider !== 'local') {
            document.getElementById('passwordSection').style.display = 'none';
        }

        // Handle form submit
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');
            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            const first_name = document.getElementById('profileFirstName').value.trim();
            const last_name = document.getElementById('profileLastName').value.trim();
            const phone = document.getElementById('profilePhone').value.trim();
            const current_password = document.getElementById('currentPassword').value;
            const new_password = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;

            // Validate password change if requested
            if (new_password) {
                if (new_password.length < 8) {
                    errorDiv.textContent = 'New password must be at least 8 characters';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (!/[A-Z]/.test(new_password) || !/[a-z]/.test(new_password) || !/[0-9]/.test(new_password)) {
                    errorDiv.textContent = 'Password must contain uppercase, lowercase, and a number';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (new_password !== confirmNewPassword) {
                    errorDiv.textContent = 'New passwords do not match';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (!current_password) {
                    errorDiv.textContent = 'Please enter your current password';
                    errorDiv.style.display = 'block';
                    return;
                }
            }

            const body = { first_name, last_name, phone };
            if (new_password && current_password) {
                body.current_password = current_password;
                body.new_password = new_password;
            }

            try {
                const response = await fetch(`${API_URL}/auth/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    // Update local storage with new user data
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    // Update avatar
                    const first = (data.user.first_name || data.user.email || 'U').charAt(0).toUpperCase();
                    const last = (data.user.last_name || '').charAt(0).toUpperCase();
                    document.getElementById('avatarInitials').textContent = first + last || '👤';

                    successDiv.textContent = data.message || 'Profile updated successfully!';
                    successDiv.style.display = 'block';

                    // Clear password fields
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmNewPassword').value = '';
                } else {
                    errorDiv.textContent = data.error || 'Failed to update profile';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
