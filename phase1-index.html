<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Revenue Simulator - Phase 1</title>
    <link rel="stylesheet" href="phase1-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Subscription Revenue Simulator</h1>
            <p>Basic SaaS revenue calculations and projections</p>
        </header>

        <main>
            <section class="input-section">
                <h2>Business Parameters</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="price">Monthly Price ($)</label>
                        <input type="number" id="price" value="99" min="1" step="1">
                    </div>
                    <div class="input-group">
                        <label for="churn">Monthly Churn Rate (%)</label>
                        <input type="number" id="churn" value="5" min="0" max="100" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="adSpend">Monthly Ad Spend ($)</label>
                        <input type="number" id="adSpend" value="5000" min="0" step="100">
                    </div>
                    <div class="input-group">
                        <label for="growthRate">Monthly Growth Rate (%)</label>
                        <input type="number" id="growthRate" value="10" min="0" max="100" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="initialCustomers">Initial Customers</label>
                        <input type="number" id="initialCustomers" value="100" min="0" step="1">
                    </div>
                    <div class="input-group">
                        <label for="cac">Customer Acquisition Cost ($)</label>
                        <input type="number" id="cac" value="500" min="0" step="10">
                    </div>
                </div>
                <div class="button-group">
                    <button id="calculateBtn" class="btn-primary">Calculate Projections</button>
                </div>
            </section>

            <section class="metrics-section">
                <h2>Key Metrics</h2>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <h3>LTV</h3>
                        <p id="ltvValue">$0</p>
                        <span class="metric-subtitle">Lifetime Value</span>
                    </div>
                    <div class="metric-card">
                        <h3>ARR</h3>
                        <p id="arrValue">$0</p>
                        <span class="metric-subtitle">Annual Recurring Revenue</span>
                    </div>
                    <div class="metric-card">
                        <h3>LTV/CAC Ratio</h3>
                        <p id="ltvCacRatio">0</p>
                        <span class="metric-subtitle">Efficiency Metric</span>
                    </div>
                    <div class="metric-card">
                        <h3>Payback Period</h3>
                        <p id="paybackPeriod">0 months</p>
                        <span class="metric-subtitle">CAC Recovery Time</span>
                    </div>
                </div>
            </section>

            <section class="charts-section">
                <h2>12-Month Projections</h2>
                <div class="chart-container">
                    <canvas id="revenueChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="customerChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="phase1-script.js"></script>
</body>
</html>
