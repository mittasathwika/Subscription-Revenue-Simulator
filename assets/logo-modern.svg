<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Modern Dark Theme -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e"/>
  
  <!-- Neon Gradient -->
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Abstract Chart/Graph Shape -->
  <path d="M 40 140 L 60 140 L 60 110 L 80 110 L 80 80 L 100 80 L 100 50 L 120 50 L 120 70 L 140 70 L 140 40 L 160 40 L 160 140" 
        stroke="url(#neonGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Data Points -->
  <circle cx="60" cy="110" r="4" fill="#00d4ff"/>
  <circle cx="80" cy="80" r="4" fill="#00d4ff"/>
  <circle cx="100" cy="50" r="4" fill="#00d4ff"/>
  <circle cx="120" cy="70" r="4" fill="#7b2cbf"/>
  <circle cx="140" cy="40" r="4" fill="#7b2cbf"/>
  
  <!-- Center Icon -->
  <circle cx="100" cy="100" r="25" fill="#00d4ff" opacity="0.2"/>
  <text x="100" y="108" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" text-anchor="middle">$</text>
</svg>
