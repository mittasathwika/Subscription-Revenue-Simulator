<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Dollar Sign Icon -->
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="white" text-anchor="middle">$</text>
  
  <!-- Chart Bars -->
  <rect x="60" y="110" width="15" height="35" rx="3" fill="white" opacity="0.8"/>
  <rect x="80" y="100" width="15" height="45" rx="3" fill="white" opacity="0.9"/>
  <rect x="100" y="85" width="15" height="60" rx="3" fill="white"/>
  <rect x="120" y="95" width="15" height="50" rx="3" fill="white" opacity="0.9"/>
  <rect x="140" y="105" width="15" height="40" rx="3" fill="white" opacity="0.8"/>
  
  <!-- Growth Arrow -->
  <path d="M 140 70 L 160 50 L 150 50 L 160 50 L 160 60" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
